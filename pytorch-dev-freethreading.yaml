name: pytorch-dev
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.14
  - python-freethreading
  - pip
  - cpython

  # Select compiler-version (optional, but recommended)
  # These are pulled in by cuda-nvcc implicitly
  - gcc<16
  - gxx<16
  # Add GDB, to bundle in py-bt support.
  - gdb
  # Certain features (like cpp_wrapper for inductor) can be tested in clang as
  # well.  The pipeline currently tests with clang-18.
  - clang<19
  - clangxx<19
  - lldb

  # Speedup linking
  - mold

  # CUDA requirements, even if using system CUDA
  - libmagma-devel<2.10
  - cuda-driver-dev
  - cuda-version=13.2
  - cudnn
  - conda-gcc-specs # Needed for triton to find libcuda.so

  # The following 6 packages install cudatoolkit
  # Not necessary in qgpu as it's installed system-wide
  - cuda-libraries-dev
  - cuda-nvcc
  - cuda-gdb
  - cuda-nvtx-dev
  - cuda-nvml-dev
  - cuda-cupti-dev

  # PyTorch dependencies
  - ccache
  - cmake
  - fsspec
  - mkl
  - mkl-include
  - ninja
  - packaging
  - pyyaml
  - scikit-build-core
  - setuptools
  - sysroot_linux-64
  - types-dataclasses
  - typing
  - typing-extensions
  - wheel

  # Test dependencies
  - numpy
  - expecttest
  - hypothesis
  - lintrunner
  #- scipy
  - psutil
  - pytest
  - parameterized
  - pyrefly
  - uv

  # Development utilities
  #- ghstack
  - ipython
  - pytest-sugar
  - pytest-xdist

  # torch.compile, hard dependencies
  - filelock
  - sympy

  # torch.compile, optional dependencies
  - astunparse
  - dill
  - jinja2
  - lark
  - optree
  - tabulate
  - networkx
  - z3-solver
  - pyyaml

  # triton dependencies, if building from source
  - zlib

  # torch.compile halide backend
  #- halide-python
